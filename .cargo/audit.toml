[advisories]
ignore = [
    # rustls-webpki 0.103.10 — reachable panic in CRL parsing
    # Transitive via dioxus → reqwest → rustls. Awaiting upstream fix.
    # https://rustsec.org/advisories/RUSTSEC-2026-0104
    "RUSTSEC-2026-0104",

    # rustls-webpki 0.103.10 — URI name constraints incorrectly accepted
    # Transitive via dioxus → reqwest → rustls. Awaiting upstream fix.
    # https://rustsec.org/advisories/RUSTSEC-2026-0098
    "RUSTSEC-2026-0098",

    # rustls-webpki 0.103.10 — wildcard name constraints bypass
    # Transitive via dioxus → reqwest → rustls. Awaiting upstream fix.
    # https://rustsec.org/advisories/RUSTSEC-2026-0099
    "RUSTSEC-2026-0099",
]
