[advisories]
ignore = [
    # rustls-webpki 0.103.10 — reachable panic in CRL parsing
    # Transitive dep via dioxus → reqwest → rustls → rustls-webpki.
    # Fix requires dioxus to update its dependency chain.
    # Track: https://rustsec.org/advisories/RUSTSEC-2026-0104
    { id = "RUSTSEC-2026-0104", reason = "transitive via dioxus, awaiting upstream fix" },

    # rustls-webpki 0.103.10 — URI name constraints incorrectly accepted
    # Same transitive chain as above.
    # Track: https://rustsec.org/advisories/RUSTSEC-2026-0098
    { id = "RUSTSEC-2026-0098", reason = "transitive via dioxus, awaiting upstream fix" },

    # rustls-webpki 0.103.10 — wildcard name constraints bypass
    # Same transitive chain as above.
    # Track: https://rustsec.org/advisories/RUSTSEC-2026-0099
    { id = "RUSTSEC-2026-0099", reason = "transitive via dioxus, awaiting upstream fix" },
]
