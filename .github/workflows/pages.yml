name: Deploy fixture to rs-grid-site

# Builds the e2e fixture WASM app and pushes it to rs-grid-site so it is
# served at https://rs-grid.com/wasm/fixture/. The deploy.yml workflow on
# rs-grid-site triggers automatically on any push to its main branch.
#
# rs-grid is a private repo — GitHub Pages on private repos requires a paid
# plan, so we push the built artefacts directly to the public rs-grid-site
# repo using SITE_TOKEN (same token used by bench.yml for benchmark data).

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: fixture-deploy
  cancel-in-progress: false

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-push:
    name: Build and push fixture
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: Install trunk
        run: cargo install trunk --locked

      # Pages serves the minimal e2e fixture (no Tailwind) — proves the engine
      # renders on every push. The styled demo lives in rs-grid-example-leptos
      # and is surfaced via rs-grid.com.
      - name: trunk build (fixture-leptos)
        working-directory: e2e/fixture-leptos
        run: trunk build --release --public-url /wasm/fixture/

      - name: Push fixture to rs-grid-site
        env:
          SITE_TOKEN: ${{ secrets.SITE_TOKEN }}
        run: |
          git clone https://x-access-token:${SITE_TOKEN}@github.com/ruxelion/rs-grid-site.git _site
          rm -rf _site/docs/public/wasm/fixture
          mkdir -p _site/docs/public/wasm/fixture
          cp -r e2e/fixture-leptos/dist/. _site/docs/public/wasm/fixture/
          cd _site
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/public/wasm/fixture/
          git diff --staged --quiet || git commit -m "chore: update fixture WASM [${GITHUB_SHA::7}]"
          git push
