name: Coverage

on:
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - uses: taiki-e/install-action@cargo-llvm-cov

      - uses: taiki-e/install-action@nextest

      - name: Generate coverage (run tests once)
        run: |
          cargo llvm-cov nextest \
            -p rs-grid-core -p rs-grid-scene -p rs-grid-icons \
            --html --output-dir target/llvm-cov/html

      - name: Export JSON from existing coverage data
        run: |
          cargo llvm-cov report \
            -p rs-grid-core -p rs-grid-scene -p rs-grid-icons \
            --json --output-path target/llvm-cov/coverage.json

      - name: Upload HTML report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: target/llvm-cov/html/
          retention-days: 30

      - name: Update coverage badge (Gist)
        if: github.ref == 'refs/heads/main'
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
          GIST_ID: ${{ secrets.GIST_ID }}
        run: |
          PCT=$(jq '.data[0].totals.lines.percent' target/llvm-cov/coverage.json)
          PCT_INT=$(echo "$PCT" | cut -d'.' -f1)
          if   [ "$PCT_INT" -ge 90 ]; then COLOR="brightgreen"
          elif [ "$PCT_INT" -ge 80 ]; then COLOR="green"
          elif [ "$PCT_INT" -ge 70 ]; then COLOR="yellow"
          elif [ "$PCT_INT" -ge 60 ]; then COLOR="orange"
          else                              COLOR="red"
          fi
          LABEL=$(printf '%.1f%%' "$PCT")
          PAYLOAD=$(jq -n \
            --arg msg "$LABEL" \
            --arg color "$COLOR" \
            '{
              schemaVersion: 1,
              label: "coverage",
              message: $msg,
              color: $color
            }')
          curl -sS -X PATCH \
            -H "Authorization: token $GIST_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/gists/$GIST_ID" \
            -d "{\"files\":{\"coverage.json\":{\"content\":$(echo "$PAYLOAD" | jq -Rs .)}}}"
