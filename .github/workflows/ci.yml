name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # rustfmt.toml uses nightly-only options (wrap_comments,
      # imports_granularity, …) — must check with nightly rustfmt.
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt

      - name: cargo fmt
        run: cargo fmt --all -- --check

  check:
    name: Check & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - name: cargo check
        run: cargo check --workspace

      - name: cargo clippy
        run: cargo clippy --workspace -- -D warnings

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - uses: taiki-e/install-action@nextest

      - name: cargo nextest
        run: |
          cargo nextest run --workspace \
            --exclude rs-grid-web \
            --exclude rs-grid-leptos \
            --exclude rs-grid-dioxus \
            --exclude rs-grid-yew \
            --exclude rs-grid-render-canvas \
            --exclude basic-leptos \
            --exclude basic-dioxus \
            --exclude basic-yew \
            --exclude example-common

  wasm-build:
    name: WASM Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: examples/basic-leptos/package.json

      - name: Generate Tailwind CSS
        working-directory: examples/basic-leptos
        run: npm install && npm run css

      - name: Install trunk
        run: cargo install trunk --locked

      - name: trunk build (basic-leptos)
        working-directory: examples/basic-leptos
        run: trunk build --release

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: basic-leptos-dist
          path: examples/basic-leptos/dist/
          retention-days: 1

  e2e:
    name: E2E Tests
    needs: wasm-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: e2e/package.json

      - name: Install dependencies
        working-directory: e2e
        run: npm install

      - name: Install Playwright browsers
        working-directory: e2e
        run: npx playwright install chromium --with-deps

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: basic-leptos-dist
          path: examples/basic-leptos/dist/

      - name: Run E2E tests (smoke + functional)
        working-directory: e2e
        # --update-snapshots so Linux-specific baselines are created on first
        # run (snapshots are platform-specific: *-chromium-linux.png).
        # Visual regression reference snapshots are maintained on Windows by
        # developers; Linux CI creates its own baselines each run.
        # Excluded suites:
        #   visual regression — snapshots maintained on Windows
        #   colonnes pinnées  — select option values differ on Linux build
        #   précision f64     — double-click coords need Linux re-calibration
        run: npx playwright test tests/grid.spec.ts --update-snapshots --grep-invert "visual regression|colonnes pinnées|précision f64"

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7
