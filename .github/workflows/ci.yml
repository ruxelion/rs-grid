name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # rustfmt.toml uses nightly-only options (wrap_comments,
      # imports_granularity, …) — must check with nightly rustfmt.
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt

      - name: cargo fmt
        run: cargo fmt --all -- --check

  check:
    name: Check & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - name: cargo check
        run: cargo check --workspace

      - name: cargo clippy
        run: cargo clippy --workspace -- -D warnings

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - uses: taiki-e/install-action@nextest

      - name: cargo nextest
        run: |
          cargo nextest run --workspace \
            --exclude rs-grid-web \
            --exclude rs-grid-leptos \
            --exclude rs-grid-dioxus \
            --exclude rs-grid-yew \
            --exclude rs-grid-render-canvas \
            --exclude basic-leptos \
            --exclude basic-dioxus \
            --exclude basic-yew \
            --exclude example-common

  wasm-build:
    name: WASM Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - uses: jetli/trunk-action@v0.5.0
        with:
          version: latest

      - name: trunk build (basic-leptos)
        working-directory: examples/basic-leptos
        run: trunk build --release
