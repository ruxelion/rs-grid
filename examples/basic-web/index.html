<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>rs-grid — basic-web</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: #f0f0f5;
      font-family: system-ui, sans-serif;
    }

    header {
      height: 48px;
      display: flex;
      align-items: center;
      padding: 0 16px;
      background: #1e1e2e;
      color: #cdd6f4;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    #grid-container {
      position: absolute;
      inset: 48px 16px 16px;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,.15);
    }

    #grid-canvas {
      width: 100%;
      height: 100%;
      display: block;
      cursor: default;
    }
  </style>
</head>
<body>
  <header>rs-grid · 50 000 rows · Canvas renderer</header>
  <div id="grid-container">
    <canvas id="grid-canvas"></canvas>
  </div>

  <script type="module">
    import init from './pkg/basic_web.js';
    await init();
  </script>
</body>
</html>
