[watch]
ignore = ["dist"]
paths = [
  "src",
  "../../crates/rs-grid-core/src",
  "../../crates/rs-grid-render-canvas/src",
  "../../crates/rs-grid-scene/src",
  "../../crates/rs-grid-web/src",
]

[serve]
port = 9082

[build]
dist = "dist"
# Release build: strips debug code, produces optimised WASM
release = true
target = "index.html"
