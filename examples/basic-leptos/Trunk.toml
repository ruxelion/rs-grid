[watch]
ignore = ["dist", "generated"]
paths = [
  "src",
  "../../crates/rs-grid-core/src",
  "../../crates/rs-grid-leptos/src",
  "../../crates/rs-grid-render-canvas/src",
  "../../crates/rs-grid-scene/src",
  "../../crates/rs-grid-web/src",
]


[serve]
port = 9080
addresses = ["0.0.0.0"]

[build]
dist = "dist"
release = false
target = "index.html"

# Generate Tailwind CSS before every Trunk build so `generated/tailwind.css`
# is always present (the file is .gitignore-d; this hook recreates it).
# scripts/build-css.mjs installs node_modules when absent (CI / clean clone)
# then runs `npm run css`. Works on Windows, macOS and Linux.
[[hooks]]
stage = "pre_build"
command = "node"
command_arguments = ["scripts/build-css.mjs"]
