[workspace]
members = [
    "crates/rs-grid-core",
    "crates/rs-grid-scene",
    "crates/rs-grid-render-canvas",
    "crates/rs-grid-web",
    "crates/rs-grid-leptos",
    "examples/basic-web",
    "examples/basic-leptos",
]
resolver = "2"

[workspace.dependencies]
wasm-bindgen = "0.2"
js-sys = "0.3"
console_error_panic_hook = "0.1"

[workspace.dependencies.web-sys]
version = "0.3"
features = [
    "CanvasRenderingContext2d",
    "HtmlCanvasElement",
    "Window",
    "Document",
    "Element",
    "EventTarget",
    "MouseEvent",
    "WheelEvent",
    "DomRect",
    "ResizeObserver",
    "ResizeObserverEntry",
    "ResizeObserverSize",
    "Performance",
    "Request",
    "RequestInit",
    "RequestMode",
    "Response",
]
